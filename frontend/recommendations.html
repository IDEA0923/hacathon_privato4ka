<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#5b5bf6" />
  <title>Рекомендации — AI-рекрутер олимпиад</title>
  <link rel="stylesheet" href="/css/reset.css" />
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="/" class="logo">🎓 AI-рекрутер</a>
      <nav class="nav nav--desktop">
        <a href="/profile.html">Профиль</a>
        <a href="/recommendations.html" class="active">Рекомендации</a>
        <a href="/calendar.html">Календарь</a>
      </nav>
    </div>
  </header>
  <main class="main">
    <div class="container">
      <h1>Подобрано для вас</h1>
      <p class="muted" style="margin-bottom: 24px;">
        Олимпиады отсортированы по релевантности вашему профилю.
      </p>

      <div class="filters">
        <select id="filter-subject" class="form__select filters__select">
          <option value="">Все предметы</option>
        </select>
        <select id="filter-level" class="form__select filters__select">
          <option value="">Все уровни</option>
          <option value="1">I уровень</option>
          <option value="2">II уровень</option>
          <option value="3">III уровень</option>
        </select>
        <button id="filter-reset" class="btn btn--ghost btn--sm">Сбросить</button>
      </div>

      <div id="recommendations" class="cards"></div>
    </div>
  </main>

  <nav class="tabbar">
    <a href="/" class="tabbar__item">
      <span class="tabbar__icon">🏠</span>
      <span class="tabbar__label">Главная</span>
    </a>
    <a href="/profile.html" class="tabbar__item">
      <span class="tabbar__icon">👤</span>
      <span class="tabbar__label">Профиль</span>
    </a>
    <a href="/recommendations.html" class="tabbar__item">
      <span class="tabbar__icon">🎯</span>
      <span class="tabbar__label">Подбор</span>
    </a>
    <a href="/calendar.html" class="tabbar__item">
      <span class="tabbar__icon">📅</span>
      <span class="tabbar__label">План</span>
    </a>
  </nav>

  <script type="module" src="/js/telegram.js"></script>
  <script type="module" src="/js/recommendations.js"></script>
</body></html>
