version: '3.8'

services:

  db:
    image: postgres:latest
    container_name: postgress
    restart: always
    environment:
      POSTGRES_USER: ${postgress_login}
      POSTGRES_PASSWORD: ${postgress_password}
      POSTGRES_DB: ${POSTGRES_DB}
    # ports:
    #   - "5432:5432"
    volumes:
      - ./pg_data:/var/lib/postgresql:Z
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:Z
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    # command: ["postgres", "-c", "client_encoding=UTF8", "-c", "lc_ctype=ru_RU.UTF-8"]
  my_bot:
    build: ./bot           # Путь до папки с Dockerfile бота
    container_name: bot
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python main.py' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./bot:/app:Z
    environment:
      - TOKEN=${BOT_TOKEN}
      - TOKEN_AI=${TOKEN_AI}
      - TG_ADMIN_ID=${admin_id}
      - POSTGRES_USER=${postgress_login}
      - POSTGRES_PASSWORD=${postgress_password}
      - POSTGRES_DB=${POSTGRES_DB}
    # ports:
    #   - "8080:80"
    networks:
      - app_network

  server:
    build: ./site          
    container_name: site
    stop_signal: SIGKILL
    restart: always
    ports:
      - "${PORT}:443"
    environment:
      - POSTGRES_USER=${postgress_login}
      - POSTGRES_PASSWORD=${postgress_password}
      - POSTGRES_DB=${POSTGRES_DB}
      - TOKEN_AI=${TOKEN_AI}
    networks:
      - app_network
    depends_on:
      - db
  parser:
    build: ./parser
    container_name: parser
    profiles: ["tools"]
    environment:
      - POSTGRES_USER=${postgress_login}
      - POSTGRES_PASSWORD=${postgress_password}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    volumes:
      - ./parser:/app:Z
      # Пробрасываем CSV-файл из корня проекта внутрь контейнера парсера
      - ./olympiads_2026_2027.csv:/app/olympiads_2026_2027.csv:Z
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy
  ngrok:
    image: ngrok/ngrok:latest
    restart: always
    environment:
      - NGROK_AUTHTOKEN=${NGROK_TOKEN}
    command:
      - "http"
      - "https://server:443"
    networks:
      - app_network
networks:
  app_network:
    driver: bridge
    
volumes:
  db_data: