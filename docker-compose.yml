version: "3.9"

services:
  frontend:
    build: ./frontend
    container_name: olympiads_frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: olympiads_backend
    expose:
      - "8080"
    ports:
      - "8080:8080"
    restart: unless-stopped
