<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#5b5bf6" />
    <title>AI-рекрутер олимпиад</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            color: var(--tg-theme-text-color, #1a1b2e);
            background: var(--tg-theme-secondary-bg-color, #f6f7fb);
            -webkit-font-smoothing: antialiased;
        }

        a {
            color: var(--tg-theme-link-color, #5b5bf6);
            text-decoration: none;
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: none;
        }

        :root {
            --color-bg: var(--tg-theme-secondary-bg-color, #f6f7fb);
            --color-surface: var(--tg-theme-bg-color, #ffffff);
            --color-text: var(--tg-theme-text-color, #1a1b2e);
            --color-text-muted: var(--tg-theme-hint-color, #6b7280);
            --color-border: var(--tg-theme-section-separator-color, #e5e7eb);
            --color-primary: var(--tg-theme-button-color, #5b5bf6);
            --color-primary-text: var(--tg-theme-button-text-color, #ffffff);
            --color-primary-hover: #4848d6;
            --color-primary-light: rgba(91, 91, 246, 0.12);
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 28px;
            --space-8: 40px;
            --font-h1: 700 22px/1.25 -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            --font-h2: 600 18px/1.3 -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            --font-h3: 600 16px/1.4 -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        body {
            padding-bottom: calc(56px + var(--safe-bottom));
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--space-5);
            width: 100%;
        }

        .header {
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            padding: var(--space-4) 0;
            padding-top: calc(var(--space-4) + var(--safe-top));
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header__inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-5);
        }

        .logo {
            font: var(--font-h3);
            color: var(--color-primary);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .main {
            padding: var(--space-6) 0 var(--space-8);
            min-height: calc(100vh - 80px);
        }

        h1 {
            font: var(--font-h1);
            margin-bottom: var(--space-4);
        }

        h2 {
            font: var(--font-h2);
            margin-bottom: var(--space-3);
        }

        h3 {
            font: var(--font-h3);
            margin-bottom: var(--space-2);
        }

        .muted {
            color: var(--color-text-muted);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            padding: 12px 20px;
            min-height: 44px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 15px;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn--primary {
            background: var(--color-primary);
            color: var(--color-primary-text);
        }

        .btn--primary:hover {
            background: var(--color-primary-hover);
        }

        .btn--secondary {
            background: var(--color-surface);
            color: var(--color-text);
            border: 1px solid var(--color-border);
        }

        .btn--ghost {
            background: transparent;
            color: var(--color-primary);
        }

        .btn--sm {
            padding: 6px 12px;
            font-size: 13px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .card {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            box-shadow: var(--shadow-sm);
            margin-bottom: var(--space-4);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .card__header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: var(--space-2);
        }

        .card__title {
            font: var(--font-h3);
            margin: 0;
        }

        .card__meta {
            font-size: 13px;
            color: var(--color-text-muted);
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-3);
        }

        .card__reason {
            background: var(--color-primary-light);
            padding: var(--space-3);
            border-radius: var(--radius-md);
            font-size: 14px;
            color: var(--color-text);
            border-left: 3px solid var(--color-primary);
        }

        .card__actions {
            display: flex;
            gap: var(--space-2);
            margin-top: auto;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
        }

        .badge--level-1 {
            background: #ef4444;
        }

        .badge--level-2 {
            background: #f59e0b;
        }

        .badge--level-3 {
            background: #10b981;
        }

        .loading {
            text-align: center;
            padding: var(--space-8);
            color: var(--color-text-muted);
        }

        .empty {
            text-align: center;
            padding: var(--space-8);
            color: var(--color-text-muted);
        }

        .skeleton {
            background: linear-gradient(90deg, var(--color-bg) 25%, #e8eaf0 50%, var(--color-bg) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
            height: 16px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .bot-link-banner {
            background: var(--color-primary-light);
            border: 1px solid var(--color-primary);
            border-radius: var(--radius-lg);
            padding: var(--space-4) var(--space-5);
            margin-bottom: var(--space-5);
            text-align: center;
        }

        .bot-link-banner p {
            margin-bottom: var(--space-3);
            font-size: 15px;
        }

        .bot-link-banner a {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            background: var(--color-primary);
            color: var(--color-primary-text);
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 15px;
        }

        .bot-link-banner a:hover {
            background: var(--color-primary-hover);
        }

        @media (max-width: 768px) {
            .header__inner {
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="container header__inner">
            <a href="/" class="logo" data-link>🎓 AI-рекрутер</a>
        </div>
    </header>
    <main class="main" id="app"></main>
    <script type="module">
        const tg = window.Telegram?.WebApp;
        function initTelegram() {
            if (!tg) return;
            try { tg.ready(); tg.expand(); } catch (e) { console.warn('TG init failed', e); }
        }
        const Auth = {
            getTgId() {
                if (tg?.initDataUnsafe?.user?.id) return String(tg.initDataUnsafe.user.id);
                let id = localStorage.getItem('tg_id');
                if (!id) { id = '123456789'; localStorage.setItem('tg_id', id); }
                return id;
            },
        };
        initTelegram();
        async function apiPost(path) {
            try {
                const res = await fetch(path, { method: 'POST' });
                if (!res.ok) { const text = await res.text().catch(() => ''); throw new Error('API ' + res.status + ': ' + text); }
                const ct = res.headers.get('content-type') || '';
                if (ct.includes('application/json')) return await res.json();
                return await res.text();
            } catch (err) { console.error('[API] ' + path, err); throw err; }
        }
        const Api = {
            async getProfile() {
                const csv = await apiPost('/profile/' + Auth.getTgId());
                if (typeof csv !== 'string' || !csv) return null;
                const p = csv.split(',');
                return { name: p[0] || '', subjects: p[1] || '', class: p[2] || '', region: p[3] || '' };
            },
            async getOlimpIds() {
                const data = await apiPost('/api/olimps/' + Auth.getTgId());
                return data?.ids || [];
            },
            async getOlimpDetail(id) {
                return await apiPost('/api/olimp:' + id + '/' + Auth.getTgId());
            },
            async getAllOlimps() {
                const ids = await Api.getOlimpIds();
                const results = await Promise.allSettled(ids.map(id => Api.getOlimpDetail(id)));
                return results.filter(r => r.status === 'fulfilled').map(r => r.value);
            },
        };
        function el(tag, opts = {}, children = []) {
            const node = document.createElement(tag);
            if (opts.class) node.className = opts.class;
            if (opts.text != null) node.textContent = opts.text;
            if (opts.html != null) node.innerHTML = opts.html;
            if (opts.attrs) for (const [k, v] of Object.entries(opts.attrs)) node.setAttribute(k, v);
            if (opts.on) for (const [evt, fn] of Object.entries(opts.on)) node.addEventListener(evt, fn);
            if (opts.style) Object.assign(node.style, opts.style);
            for (const child of [].concat(children)) {
                if (child == null || child === false) continue;
                node.appendChild(typeof child === 'string' ? document.createTextNode(child) : child);
            }
            return node;
        }
        function $(s, r = document) { return r.querySelector(s); }
        function clear(n) { while (n.firstChild) n.removeChild(n.firstChild); }
        function deadlineLabel(iso) {
            if (!iso) return '—';
            const d = Math.ceil((new Date(iso) - new Date()) / 86400000);
            if (d < 0) return 'просрочено';
            if (d === 0) return 'сегодня';
            if (d === 1) return 'завтра';
            if (d <= 7) return 'через ' + d + ' дн.';
            const dt = new Date(iso);
            const months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
            return dt.getDate() + ' ' + months[dt.getMonth()] + ' ' + dt.getFullYear();
        }
        function romanLevel(l) { return { '1': 'I', '2': 'II', '3': 'III' }[String(l)] || l || '?'; }
        function skeletonCard() {
            return el('div', { class: 'card' }, [
                el('div', { class: 'skeleton', style: { width: '60%', height: '20px' } }),
                el('div', { class: 'skeleton', style: { width: '40%', marginTop: '8px' } }),
                el('div', { class: 'skeleton', style: { width: '100%', height: '60px', marginTop: '12px' } }),
            ]);
        }
        function botBanner() {
            return el('div', { class: 'bot-link-banner' }, [
                el('p', { text: '🤖 Для полноценной работы перейдите в бота' }),
                el('a', { attrs: { href: 'https://t.me/AI_olimp_hack_bot', target: '_blank' }, text: 'Открыть бота →' }),
            ]);
        }
        function renderHome() {
            const app = document.getElementById('app');
            app.innerHTML = '';
            const sec = el('section', { class: 'container' }, [
                botBanner(),
                el('div', { style: { textAlign: 'center', padding: 'var(--space-8) 0' } }, [
                    el('h1', { text: 'Найди свою олимпиаду', style: { fontSize: '32px', marginBottom: 'var(--space-4)' } }),
                    el('p', { class: 'muted', text: 'Персональные рекомендации олимпиад с AI-обоснованиями', style: { fontSize: '16px', maxWidth: '500px', margin: '0 auto var(--space-6)' } }),
                    el('a', { class: 'btn btn--primary', attrs: { href: '/recommendations' }, text: 'Смотреть рекомендации →', on: { click: function (e) { e.preventDefault(); history.pushState(null, null, '/recommendations'); navigate('/recommendations'); } } }),
                ]),
            ]);
            app.appendChild(sec);
        }
        async function renderProfile() {
            const app = document.getElementById('app');
            app.innerHTML = '';
            const container = el('div', { class: 'container' }, [
                el('h1', { text: 'Ваш профиль' }),
                el('div', { id: 'profile-content' }),
            ]);
            app.appendChild(container);
            const content = $('#profile-content');
            content.appendChild(el('div', { class: 'loading', text: 'Загружаем профиль...' }));
            try {
                const profile = await Api.getProfile();
                clear(content);
                if (!profile || !profile.name) {
                    content.appendChild(el('div', { class: 'empty' }, [
                        el('h3', { text: 'Профиль не найден' }),
                        el('p', { class: 'muted', text: 'Заполните профиль через бота @AI_olimp_hack_bot' }),
                        el('a', { class: 'btn btn--primary', attrs: { href: 'https://t.me/AI_olimp_hack_bot', target: '_blank' }, text: '🤖 Перейти в бота', style: { marginTop: '16px', display: 'inline-block' } }),
                    ]));
                    return;
                }
                const fields = [{ label: 'Имя', value: profile.name }, { label: 'Предметы', value: profile.subjects }, { label: 'Класс', value: profile.class }, { label: 'Регион', value: profile.region }];
                content.appendChild(el('div', { class: 'card' }, [
                    el('h3', { text: 'Данные профиля' }),
                    ...fields.map(f => el('div', { class: 'card__meta' }, [el('strong', { text: f.label + ': ' }), el('span', { text: String(f.value || '—') })])),
                ]));
            } catch (err) {
                clear(content);
                content.appendChild(el('div', { class: 'empty' }, [
                    el('p', { text: 'Ошибка: ' + err.message }),
                    el('a', { class: 'btn btn--primary', attrs: { href: 'https://t.me/AI_olimp_hack_bot', target: '_blank' }, text: '🤖 Перейти в бота', style: { marginTop: '16px', display: 'inline-block' } }),
                ]));
            }
        }
        async function renderRecommendations() {
            const app = document.getElementById('app');
            app.innerHTML = '';
            const container = el('div', { class: 'container' }, [
                botBanner(),
                el('h1', { text: 'Подобрано для вас' }),
                el('p', { class: 'muted', text: 'Олимпиады с AI-обоснованиями', style: { marginBottom: '24px' } }),
                el('div', { id: 'recommendations' }),
            ]);
            app.appendChild(container);
            const listEl = $('#recommendations');
            for (let i = 0; i < 3; i++) listEl.appendChild(skeletonCard());
            try {
                const olimps = await Api.getAllOlimps();
                clear(listEl);
                if (!olimps.length) {
                    listEl.appendChild(el('div', { class: 'empty' }, [
                        el('h3', { text: 'Рекомендаций пока нет' }),
                        el('p', { class: 'muted', text: 'Заполните профиль через бота' }),
                        el('a', { class: 'btn btn--primary', attrs: { href: 'https://t.me/AI_olimp_hack_bot', target: '_blank' }, text: '🤖 Перейти в бота', style: { marginTop: '16px', display: 'inline-block' } }),
                    ]));
                    return;
                }
                olimps.forEach(o => {
                    const reasonBox = el('div', { class: 'card__reason', style: { display: 'none' } });
                    const explainBtn = el('button', { class: 'btn btn--ghost btn--sm', text: '💡 Почему мне?' });
                    explainBtn.addEventListener('click', () => {
                        if (reasonBox.style.display === 'block') { reasonBox.style.display = 'none'; }
                        else { reasonBox.style.display = 'block'; reasonBox.textContent = o.point || 'Обоснование недоступно.'; }
                    });
                    const lvlBadge = o.lvl ? el('span', { class: 'badge badge--level-' + (o.lvl === '1' ? '1' : o.lvl === '2' ? '2' : '3'), text: romanLevel(o.lvl) + ' ур.' }) : null;
                    const linkEl = o.lnk ? el('a', { text: '🔗 Ссылка', attrs: { href: o.lnk, target: '_blank' } }) : null;
                    listEl.appendChild(el('div', { class: 'card' }, [
                        el('div', { class: 'card__header' }, [el('h3', { class: 'card__title', text: o.name_1 || 'Олимпиада' }), lvlBadge]),
                        el('div', { class: 'card__meta' }, [
                            el('span', { text: '📚 ' + (o.subjects || '—') }),
                            el('span', { text: '🎓 ' + (o.class_start || '') + '–' + (o.class_end || '') + ' класс' }),
                            el('span', { text: '📅 ' + deadlineLabel(o.date_start) }),
                        ]),
                        el('div', { class: 'card__meta' }, [el('span', { text: '🏁 ' + (o.frm || '—') }), linkEl]),
                        reasonBox,
                        el('div', { class: 'card__actions' }, [explainBtn]),
                    ]));
                });
            } catch (err) {
                clear(listEl);
                listEl.appendChild(el('div', { class: 'empty' }, [
                    el('p', { text: 'Ошибка: ' + err.message }),
                    el('a', { class: 'btn btn--primary', attrs: { href: 'https://t.me/AI_olimp_hack_bot', target: '_blank' }, text: '🤖 Перейти в бота', style: { marginTop: '16px', display: 'inline-block' } }),
                ]));
            }
        }
        const ROUTES = { '/': renderHome, '/profile': renderProfile, '/recommendations': renderRecommendations };
        function navigate(path) {
            const fn = ROUTES[path] || ROUTES['/'];
            fn();
            document.querySelectorAll('[data-link]').forEach(a => a.classList.toggle('active', a.getAttribute('href') === path));
        }
        document.addEventListener('click', e => {
            const link = e.target.closest('[data-link]');
            if (link) { e.preventDefault(); const p = link.getAttribute('href'); history.pushState(null, null, p); navigate(p); }
        });
        window.addEventListener('popstate', () => navigate(location.pathname));
        navigate(location.pathname);
    </script>
</body>

</html>
