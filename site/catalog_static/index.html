<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
  <meta name="theme-color" content="#0f0e17"/>
  <title>Олимпиады</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
ul,ol{list-style:none;}
img{max-width:100%;display:block;}

/* ── VARS ── */
:root{
  --bg:          var(--tg-theme-bg-color,       #0f0e17);
  --bg2:         var(--tg-theme-secondary-bg-color, #1a1929);
  --surface:     var(--tg-theme-secondary-bg-color, #1e1d2e);
  --text:        var(--tg-theme-text-color,      #fffffe);
  --muted:       var(--tg-theme-hint-color,      #6e6d7a);
  --border:      rgba(255,255,255,0.08);
  --accent:      var(--tg-theme-button-color,    #7b5ea7);
  --accent-text: var(--tg-theme-button-text-color,#fffffe);
  --amber:       #f6ae2d;
  --green:       #2ec4b6;
  --red:         #e84855;
  --r-sm:8px;--r-md:14px;--r-lg:20px;--r-xl:28px;
  --tabbar:56px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
  font-family:'Nunito',sans-serif;
  color:var(--text);
  background:var(--bg);
}

/* ── LAYOUT ── */
body{padding-bottom:calc(var(--tabbar) + var(--safe-bottom));overflow-x:hidden;}
#root{min-height:100dvh;}
.page{padding:0 16px 32px;padding-top:calc(16px + var(--safe-top));animation:fadeUp .3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── TABBAR ── */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:200;
  background:var(--surface);border-top:1px solid var(--border);
  padding-bottom:var(--safe-bottom);
  display:flex;
  backdrop-filter:blur(12px);
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;height:var(--tabbar);color:var(--muted);font-size:10px;font-weight:600;
  letter-spacing:.4px;text-transform:uppercase;transition:color .15s;
  -webkit-tap-highlight-color:transparent;
}
.tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.tab.active{color:var(--accent);}
.tab.active svg{stroke:var(--accent);}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;padding-top:calc(12px + var(--safe-top));
  position:sticky;top:0;z-index:100;
  background:var(--bg);border-bottom:1px solid var(--border);
}
.topbar__title{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600;letter-spacing:-.3px;}
.topbar__sub{font-size:12px;color:var(--muted);margin-top:1px;}

/* ── HERO ── */
.hero{padding:32px 0 24px;text-align:left;}
.hero__eyebrow{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.hero__title{font-family:'Unbounded',sans-serif;font-size:26px;font-weight:800;line-height:1.15;margin-bottom:12px;
  background:linear-gradient(135deg,var(--text) 0%,var(--accent) 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.hero__sub{font-size:15px;color:var(--muted);line-height:1.6;}

/* ── PROFILE CARD ── */
.profile-card{
  background:var(--surface);border-radius:var(--r-xl);padding:20px;
  border:1px solid var(--border);margin-bottom:20px;
  display:flex;align-items:center;gap:16px;
}
.profile-card__avatar{
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--amber));
  display:flex;align-items:center;justify-content:center;
  font-family:'Unbounded',sans-serif;font-size:20px;font-weight:800;
  color:#fff;flex-shrink:0;
}
.profile-card__name{font-weight:700;font-size:16px;margin-bottom:4px;}
.profile-card__meta{font-size:13px;color:var(--muted);}

/* ── STAT ROW ── */
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px;}
.stat{background:var(--surface);border-radius:var(--r-lg);padding:14px 12px;border:1px solid var(--border);text-align:center;}
.stat__val{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:800;color:var(--accent);}
.stat__lbl{font-size:11px;color:var(--muted);margin-top:3px;font-weight:600;letter-spacing:.3px;}

/* ── SECTION HEADER ── */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-head__title{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;letter-spacing:-.2px;}
.sec-head__count{font-size:12px;color:var(--muted);font-weight:600;}

/* ── CARDS ── */
.card{
  background:var(--surface);border-radius:var(--r-lg);padding:18px;
  border:1px solid var(--border);margin-bottom:12px;
  transition:transform .15s,box-shadow .15s;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.card:active{transform:scale(.98);}
.card--highlight{border-color:rgba(123,94,167,.35);box-shadow:0 0 0 1px rgba(123,94,167,.2);}
.card__row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;}
.card__name{font-weight:700;font-size:15px;line-height:1.35;flex:1;}
.card__badge{flex-shrink:0;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.3px;}
.badge-school{background:rgba(46,196,182,.15);color:var(--green);}
.badge-region{background:rgba(246,174,45,.15);color:var(--amber);}
.badge-country{background:rgba(123,94,167,.2);color:var(--accent);}
.badge-intl{background:rgba(232,72,85,.15);color:var(--red);}
.card__meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.card__tag{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.card__ai{
  background:rgba(123,94,167,.1);border:1px solid rgba(123,94,167,.2);
  border-radius:var(--r-md);padding:12px;font-size:13px;line-height:1.55;
  color:var(--text);margin-bottom:12px;
  display:none;
}
.card__ai.visible{display:block;animation:fadeUp .25s ease;}
.card__ai-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
.card__actions{display:flex;gap:8px;}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 16px;min-height:40px;border-radius:var(--r-md);
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent;
  letter-spacing:.2px;
}
.btn--primary{background:var(--accent);color:var(--accent-text);}
.btn--primary:active{opacity:.85;}
.btn--ghost{background:rgba(255,255,255,.07);color:var(--text);}
.btn--ghost:active{background:rgba(255,255,255,.12);}
.btn--sm{padding:7px 12px;font-size:12px;min-height:34px;}
.btn--block{width:100%;}
.btn:disabled{opacity:.4;pointer-events:none;}
.btn--link{background:none;color:var(--accent);font-size:14px;font-weight:700;padding:0;}

/* ── LOADING ── */
.skeleton{
  background:linear-gradient(90deg,var(--surface) 25%,rgba(255,255,255,.04) 50%,var(--surface) 75%);
  background-size:300% 100%;animation:shimmer 1.4s infinite;
  border-radius:var(--r-sm);
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:var(--surface);border-radius:var(--r-lg);padding:18px;border:1px solid var(--border);margin-bottom:12px;}

/* ── EMPTY / ERROR ── */
.empty{text-align:center;padding:48px 24px;}
.empty__icon{font-size:48px;margin-bottom:16px;}
.empty__title{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:700;margin-bottom:8px;}
.empty__sub{font-size:14px;color:var(--muted);line-height:1.6;}

/* ── DETAIL ── */
.detail-hero{
  background:var(--surface);border-radius:var(--r-xl);padding:20px;
  border:1px solid var(--border);margin-bottom:16px;
}
.detail-hero__title{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:800;line-height:1.3;margin-bottom:16px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.detail-item{background:var(--bg2);border-radius:var(--r-md);padding:12px;}
.detail-item__lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.detail-item__val{font-size:14px;font-weight:600;}
.detail-ai{
  background:linear-gradient(135deg,rgba(123,94,167,.15),rgba(246,174,45,.08));
  border:1px solid rgba(123,94,167,.25);border-radius:var(--r-lg);padding:16px;margin-bottom:16px;
}
.detail-ai__label{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.detail-ai__text{font-size:14px;line-height:1.65;color:var(--text);}
.detail-desc{font-size:14px;line-height:1.65;color:var(--muted);margin-bottom:16px;}

/* ── TOAST ── */
.toasts{position:fixed;top:calc(16px + var(--safe-top));left:16px;right:16px;z-index:1000;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{
  background:var(--surface);border-left:4px solid var(--accent);
  padding:12px 16px;border-radius:var(--r-md);box-shadow:0 8px 32px rgba(0,0,0,.4);
  animation:slideDown .3s ease;
}
.toast--success{border-left-color:var(--green);}
.toast--error{border-left-color:var(--red);}
.toast__t{font-weight:700;font-size:14px;margin-bottom:2px;}
.toast__b{font-size:12px;color:var(--muted);}
@keyframes slideDown{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── SPINNER ── */
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-full{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:14px;color:var(--muted);}
.loading-full .spinner{width:32px;height:32px;border-width:3px;}
.loading-full span{font-size:14px;}
  </style>
</head>
<body>
<div id="root"></div>

<nav class="tabbar" id="tabbar">
  <button class="tab active" data-tab="home">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Главная
  </button>
  <button class="tab" data-tab="list">
    <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    Олимпиады
  </button>
</nav>

<div class="toasts" id="toasts"></div>

<script type="module">
// ─────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

function getTgId() {
  return tg?.initDataUnsafe?.user?.id ?? null;
}
function getTgName() {
  const u = tg?.initDataUnsafe?.user;
  if (!u) return null;
  return [u.first_name, u.last_name].filter(Boolean).join(' ') || u.username || null;
}

// ─────────────────────────────────────────
// API
// ─────────────────────────────────────────
async function apiProfile(tgId) {
  const res = await fetch(`/profile/${tgId}`, { method: 'POST' });
  if (!res.ok) throw new Error(`profile ${res.status}`);
  const text = await res.text();
  // CSV: tg_id,subjects,class,region
  const [,subjects, cls, region] = text.split(',');
  return { subjects: subjects?.trim() || '—', cls: cls?.trim() || '—', region: region?.trim() || '—' };
}

async function apiOlimps(tgId) {
  const res = await fetch(`/api/olimps/${tgId}`, { method: 'POST' });
  if (!res.ok) throw new Error(`olimps ${res.status}`);
  const data = await res.json();
  return data.ids ?? [];
}

async function apiOlimp(olimpId, tgId) {
  const res = await fetch(`/api/olimp:${olimpId}/${tgId}`, { method: 'POST' });
  if (!res.ok) throw new Error(`olimp ${olimpId} ${res.status}`);
  return res.json();
}

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
const state = {
  tab: 'home',
  tgId: null,
  profile: null,
  profileErr: null,
  ids: null,
  idsErr: null,
  olimps: {},         // id → data | 'loading' | Error
  expanded: new Set(),
};

// ─────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────
function toast(title, body = '', type = 'info', ttl = 3500) {
  const c = document.getElementById('toasts');
  const node = document.createElement('div');
  node.className = `toast toast--${type}`;
  node.innerHTML = `<div class="toast__t">${title}</div>${body ? `<div class="toast__b">${body}</div>` : ''}`;
  c.appendChild(node);
  setTimeout(() => { node.style.transition='opacity .3s'; node.style.opacity='0'; setTimeout(()=>node.remove(),300); }, ttl);
}

// ─────────────────────────────────────────
// RENDER HELPERS
// ─────────────────────────────────────────
function badgeClass(lvl) {
  const l = (lvl||'').toLowerCase();
  if (l.includes('школ')) return 'badge-school';
  if (l.includes('регион')) return 'badge-region';
  if (l.includes('всерос') || l.includes('всеукр')) return 'badge-country';
  if (l.includes('между') || l.includes('inter')) return 'badge-intl';
  return 'badge-school';
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return iso.replace('T',' ').slice(0,16);
  return d.toLocaleDateString('ru', { day:'numeric', month:'short', year:'numeric' });
}
function daysLeft(iso) {
  const d = Math.ceil((new Date(iso) - Date.now()) / 86400000);
  if (isNaN(d)) return '';
  if (d < 0) return 'завершилась';
  if (d === 0) return 'сегодня!';
  if (d === 1) return 'завтра';
  return `через ${d} д.`;
}

// ─────────────────────────────────────────
// PAGES
// ─────────────────────────────────────────
function renderSkelCard() {
  return `<div class="skel-card">
    <div class="skeleton" style="height:16px;width:75%;margin-bottom:10px"></div>
    <div class="skeleton" style="height:12px;width:50%;margin-bottom:8px"></div>
    <div class="skeleton" style="height:12px;width:40%"></div>
  </div>`;
}

function renderHome() {
  const name = getTgName();
  const id = state.tgId;

  let profileBlock = '';
  if (!id) {
    profileBlock = `<div class="empty">
      <div class="empty__icon">🔒</div>
      <div class="empty__title">Нет доступа</div>
      <div class="empty__sub">Откройте приложение через Telegram-бота</div>
    </div>`;
  } else if (state.profileErr) {
    profileBlock = `<div class="profile-card">
      <div class="profile-card__avatar">${(name||'?')[0].toUpperCase()}</div>
      <div>
        <div class="profile-card__name">${name || 'Пользователь'}</div>
        <div class="profile-card__meta" style="color:var(--red)">Профиль не найден</div>
      </div>
    </div>`;
  } else if (!state.profile) {
    profileBlock = `<div class="profile-card">
      <div class="skeleton" style="width:56px;height:56px;border-radius:50%;flex-shrink:0"></div>
      <div style="flex:1">
        <div class="skeleton" style="height:14px;width:60%;margin-bottom:8px"></div>
        <div class="skeleton" style="height:12px;width:40%"></div>
      </div>
    </div>`;
  } else {
    const p = state.profile;
    const initials = (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    profileBlock = `<div class="profile-card">
      <div class="profile-card__avatar">${initials}</div>
      <div>
        <div class="profile-card__name">${name || `ID: ${id}`}</div>
        <div class="profile-card__meta">📚 ${p.subjects} &nbsp;·&nbsp; ${p.cls} класс &nbsp;·&nbsp; Регион ${p.region}</div>
      </div>
    </div>`;
  }

  const idsCount = state.ids ? state.ids.length : '…';
  const loadedCount = Object.values(state.olimps).filter(v => v && typeof v === 'object' && !v.message).length;

  return `
    <div class="topbar">
      <div>
        <div class="topbar__title">🎓 Олимпиады</div>
        <div class="topbar__sub">Персональный подбор</div>
      </div>
    </div>
    <div class="page">
      <div class="hero">
        <div class="hero__eyebrow">AI-рекрутер</div>
        <div class="hero__title">Найди свою олимпиаду</div>
        <div class="hero__sub">Персональные рекомендации на основе вашего профиля</div>
      </div>
      ${profileBlock}
      ${id ? `<div class="stat-row">
        <div class="stat"><div class="stat__val">${idsCount}</div><div class="stat__lbl">Подобрано</div></div>
        <div class="stat"><div class="stat__val">${loadedCount}</div><div class="stat__lbl">Загружено</div></div>
        <div class="stat"><div class="stat__val">${id ? '✓' : '—'}</div><div class="stat__lbl">Профиль</div></div>
      </div>
      <button class="btn btn--primary btn--block" id="go-list-btn">Смотреть олимпиады →</button>` : ''}
    </div>`;
}

function renderList() {
  const id = state.tgId;
  if (!id) {
    return `<div class="topbar"><div class="topbar__title">Олимпиады</div></div>
      <div class="page"><div class="empty">
        <div class="empty__icon">🔒</div>
        <div class="empty__title">Нет доступа</div>
        <div class="empty__sub">Откройте через Telegram-бота</div>
      </div></div>`;
  }

  let content = '';

  if (state.idsErr) {
    content = `<div class="empty">
      <div class="empty__icon">😔</div>
      <div class="empty__title">Не удалось загрузить</div>
      <div class="empty__sub">${state.idsErr}</div>
      <button class="btn btn--primary" style="margin-top:16px" id="retry-btn">Попробовать снова</button>
    </div>`;
  } else if (!state.ids) {
    content = renderSkelCard().repeat(4);
  } else if (state.ids.length === 0) {
    content = `<div class="empty">
      <div class="empty__icon">🔍</div>
      <div class="empty__title">Пока пусто</div>
      <div class="empty__sub">Для вашего профиля не найдено подходящих олимпиад</div>
    </div>`;
  } else {
    const items = state.ids.map(id => renderOlimpCard(id)).join('');
    content = `<div class="sec-head">
      <div class="sec-head__title">Рекомендации</div>
      <div class="sec-head__count">${state.ids.length} шт.</div>
    </div>${items}`;
  }

  return `<div class="topbar"><div class="topbar__title">Олимпиады</div></div>
    <div class="page">${content}</div>`;
}

function renderOlimpCard(olimpId) {
  const data = state.olimps[olimpId];
  const expanded = state.expanded.has(olimpId);

  if (!data) {
    return `<div class="skel-card" data-skel-id="${olimpId}">
      <div class="skeleton" style="height:15px;width:80%;margin-bottom:10px"></div>
      <div class="skeleton" style="height:12px;width:50%;margin-bottom:8px"></div>
      <div class="skeleton" style="height:12px;width:35%"></div>
    </div>`;
  }
  if (data === 'loading') {
    return `<div class="skel-card"><div class="loading-full" style="min-height:80px"><div class="spinner"></div></div></div>`;
  }
  if (data instanceof Error || data.message) {
    return `<div class="card"><div style="color:var(--red);font-size:13px">Ошибка загрузки #${olimpId}</div></div>`;
  }

  const lvl = data.lvl || '';
  const bc = badgeClass(lvl);
  const aiBlock = data.point ? `
    <div class="card__ai${expanded ? ' visible' : ''}" id="ai-${olimpId}">
      <div class="card__ai-label">✦ AI-объяснение</div>
      ${data.point}
    </div>` : '';
  const lnkBlock = data.lnk ? `<a href="${data.lnk}" target="_blank" class="btn btn--primary btn--sm">Открыть →</a>` : '';
  const aiBtn = data.point ? `<button class="btn btn--ghost btn--sm" data-ai="${olimpId}">
    ${expanded ? '▲ Скрыть' : '✦ AI-объяснение'}
  </button>` : '';

  return `<div class="card${expanded ? ' card--highlight' : ''}" data-card="${olimpId}">
    <div class="card__row">
      <div class="card__name">${data.name_1 || `Олимпиада #${olimpId}`}</div>
      ${lvl ? `<span class="card__badge ${bc}">${lvl}</span>` : ''}
    </div>
    <div class="card__meta">
      ${data.subjects ? `<span class="card__tag">📚 ${data.subjects}</span>` : ''}
      ${data.class_start != null ? `<span class="card__tag">🎓 ${data.class_start}–${data.class_end} кл.</span>` : ''}
      ${data.date_start ? `<span class="card__tag">📅 ${fmtDate(data.date_start)}</span>` : ''}
      ${data.date_end ? `<span class="card__tag">🏁 ${daysLeft(data.date_end)}</span>` : ''}
      ${data.frm ? `<span class="card__tag">📍 ${data.frm}</span>` : ''}
    </div>
    ${aiBlock}
    ${(lnkBlock || aiBtn) ? `<div class="card__actions">${aiBtn}${lnkBlock}</div>` : ''}
  </div>`;
}

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────
function render() {
  const root = document.getElementById('root');
  root.innerHTML = state.tab === 'home' ? renderHome() : renderList();

  // tab highlight
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === state.tab);
  });

  // events
  document.getElementById('go-list-btn')?.addEventListener('click', () => switchTab('list'));
  document.getElementById('retry-btn')?.addEventListener('click', () => loadIds());

  document.querySelectorAll('[data-ai]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = Number(btn.dataset.ai);
      if (state.expanded.has(id)) state.expanded.delete(id);
      else state.expanded.add(id);
      render();
    });
  });
}

function patchCard(olimpId) {
  // Try to patch just the card if it exists
  const skel = document.querySelector(`[data-skel-id="${olimpId}"]`);
  const card = document.querySelector(`[data-card="${olimpId}"]`);
  if (skel || card) {
    const target = skel || card;
    const tmp = document.createElement('div');
    tmp.innerHTML = renderOlimpCard(olimpId);
    const newCard = tmp.firstElementChild;
    if (newCard) target.replaceWith(newCard);
    // Re-attach ai btn
    document.querySelectorAll('[data-ai]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const id = Number(btn.dataset.ai);
        if (state.expanded.has(id)) state.expanded.delete(id);
        else state.expanded.add(id);
        render();
      });
    });
  } else {
    render();
  }
}

// ─────────────────────────────────────────
// DATA LOADING
// ─────────────────────────────────────────
async function loadProfile() {
  const id = state.tgId;
  if (!id) return;
  try {
    state.profile = await apiProfile(id);
    state.profileErr = null;
  } catch(e) {
    state.profileErr = e.message;
  }
  render();
}

async function loadIds() {
  const id = state.tgId;
  if (!id) return;
  state.ids = null; state.idsErr = null;
  render();
  try {
    state.ids = await apiOlimps(id);
    render();
    // load each olympiad
    for (const olimpId of state.ids) {
      loadOlimp(olimpId);
    }
  } catch(e) {
    state.idsErr = e.message;
    render();
    toast('Ошибка', e.message, 'error');
  }
}

async function loadOlimp(olimpId) {
  if (state.olimps[olimpId] && !(state.olimps[olimpId] instanceof Error)) return;
  const id = state.tgId;
  try {
    const data = await apiOlimp(olimpId, id);
    state.olimps[olimpId] = data;
  } catch(e) {
    state.olimps[olimpId] = e;
  }
  patchCard(olimpId);
}

// ─────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────
function switchTab(tab) {
  state.tab = tab;
  render();
  if (tab === 'list' && !state.ids && !state.idsErr) loadIds();
}

document.getElementById('tabbar').addEventListener('click', e => {
  const btn = e.target.closest('[data-tab]');
  if (btn) switchTab(btn.dataset.tab);
});

// ─────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────
state.tgId = getTgId();
render();
loadProfile();
</script>
</body>
</html>
